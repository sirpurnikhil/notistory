name: Bug report
description: Something isn't working right
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before filing, please run the diagnostic
        script and attach its output — it contains no notification content, only versions,
        service status, and log size/counts.
        ```
        ./bin/notistory-diagnose.sh
        ```
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ./install.sh
        2. ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: false
  - type: input
    id: distro
    attributes:
      label: Distro / desktop environment
      placeholder: e.g. KDE Plasma 6.5 on Fedora 41
    validations:
      required: true
  - type: textarea
    id: diagnostic
    attributes:
      label: Diagnostic report
      description: Paste the contents of `~/.local/share/notistory/diagnostic-report.txt` here.
      render: text
    validations:
      required: false
